<div class="workspace">
  <!-- Aurora Background Effects -->
  <div class="aurora-glow aurora-1"></div>
  <div class="aurora-glow aurora-2"></div>

  <main class="glass-card">
    <!-- Header -->
    <header class="header">
      <div class="logo-badge">AngoRPC v1.0</div>
      <h1>{{ title() }}</h1>
      <p class="subtitle">基於 Angular 22 + SSR + oRPC 的端到端類型安全電商系統</p>
    </header>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Integration Section -->
    <section class="integration-status">
      <h2>🔌 API 聯調狀態驗證</h2>
      
      <div class="status-box" [class.loading]="isLoading()" [class.success]="!isLoading() && !errorOccurred()" [class.error]="errorOccurred()">
        <!-- Status Indicator Dot -->
        <div class="indicator">
          <span class="dot"></span>
        </div>

        <!-- Status Details -->
        <div class="details">
          @if (isLoading()) {
            <p class="message pulse">正在呼叫後端 oRPC 服務端點...</p>
          } @else {
            <p class="message">{{ welcomeMessage() }}</p>
            @if (timestamp()) {
              <div class="timestamp-badge">
                <span>🕒 伺服器時間：</span>
                <code>{{ timestamp() }}</code>
              </div>
            }
          }
        </div>
      </div>

      <!-- Action Button -->
      <div class="actions">
        <button class="btn-primary" (click)="fetchHello()" [disabled]="isLoading()">
          @if (isLoading()) {
            <span>連線中...</span>
          } @else {
            <span>🔄 重新呼叫 API</span>
          }
        </button>
      </div>
    </section>

    <!-- Footer Specs -->
    <footer class="footer">
      <div class="tech-stack">
        <span class="tech-tag">Angular 22</span>
        <span class="tech-tag">oRPC</span>
        <span class="tech-tag">Zod</span>
        <span class="tech-tag">TypeScript</span>
        <span class="tech-tag">Prisma</span>
      </div>
      <p class="copyright">建立日期：2026年06月18日 | 開發團隊：Antigravity & Raybird</p>
    </footer>
  </main>
</div>

<router-outlet />

<style>
  :host {
    display: block;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Outfit', 'Inter', system-ui, sans-serif;
  }

  .workspace {
    position: relative;
    min-height: 100vh;
    width: 100%;
    background-color: #0d0f14;
    color: #f3f4f6;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
    overflow: hidden;
  }

  /* Aurora Glow Effect */
  .aurora-glow {
    position: absolute;
    width: 450px;
    height: 450px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    z-index: 1;
    pointer-events: none;
    animation: rotateGlow 20s infinite alternate;
  }

  .aurora-1 {
    background: radial-gradient(circle, #6366f1 0%, transparent 70%);
    top: -100px;
    left: -100px;
  }

  .aurora-2 {
    background: radial-gradient(circle, #ec4899 0%, transparent 70%);
    bottom: -150px;
    right: -100px;
    animation-delay: -5s;
  }

  @keyframes rotateGlow {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(100px, 50px) scale(1.2); }
  }

  /* Glassmorphism Card */
  .glass-card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 580px;
    background: rgba(22, 28, 38, 0.65);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 3rem;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .glass-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 25px 60px rgba(99, 102, 241, 0.1);
  }

  /* Header style */
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .logo-badge {
    display: inline-block;
    padding: 0.35rem 0.85rem;
    background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
    color: #ffffff;
    font-size: 0.75rem;
    font-weight: 700;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
  }

  .header h1 {
    font-size: 2.25rem;
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 0.95rem;
    color: #9ca3af;
    margin-top: 0.5rem;
    line-height: 1.5;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1) 20%, rgba(255, 255, 255, 0.1) 80%, transparent);
    margin: 2rem 0;
  }

  /* Integration box */
  .integration-status h2 {
    font-size: 1.15rem;
    font-weight: 600;
    color: #e5e7eb;
    margin-top: 0;
    margin-bottom: 1.25rem;
    letter-spacing: -0.01em;
  }

  .status-box {
    display: flex;
    align-items: flex-start;
    gap: 1.25rem;
    background: rgba(17, 24, 39, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    transition: all 0.3s ease;
  }

  /* Status Indicator colors */
  .status-box.loading .dot {
    background-color: #f59e0b;
    box-shadow: 0 0 15px #f59e0b;
    animation: blink 1.5s infinite;
  }

  .status-box.success {
    border-color: rgba(16, 185, 129, 0.2);
    background: rgba(16, 185, 129, 0.04);
  }
  .status-box.success .dot {
    background-color: #10b981;
    box-shadow: 0 0 15px #10b981;
  }

  .status-box.error {
    border-color: rgba(239, 68, 68, 0.2);
    background: rgba(239, 68, 68, 0.04);
  }
  .status-box.error .dot {
    background-color: #ef4444;
    box-shadow: 0 0 15px #ef4444;
  }

  .dot {
    display: block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-top: 0.25rem;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .details {
    flex: 1;
  }

  .message {
    font-size: 1rem;
    line-height: 1.6;
    margin: 0;
    color: #e5e7eb;
  }

  .pulse {
    color: #9ca3af;
  }

  .timestamp-badge {
    display: inline-flex;
    align-items: center;
    margin-top: 0.85rem;
    padding: 0.35rem 0.75rem;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 8px;
    font-size: 0.8rem;
    color: #9ca3af;
  }

  .timestamp-badge code {
    font-family: 'Courier New', Courier, monospace;
    color: #818cf8;
    font-weight: 600;
  }

  /* Primary Button */
  .btn-primary {
    width: 100%;
    padding: 0.95rem;
    background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
    color: #ffffff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
    transition: all 0.2s ease;
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
  }

  .btn-primary:active:not(:disabled) {
    transform: translateY(0);
  }

  .btn-primary:disabled {
    opacity: 0.65;
    cursor: not-allowed;
  }

  /* Footer Specs */
  .footer {
    margin-top: 3rem;
    text-align: center;
  }

  .tech-stack {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
  }

  .tech-tag {
    padding: 0.25rem 0.6rem;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 6px;
    font-size: 0.75rem;
    color: #9ca3af;
  }

  .copyright {
    font-size: 0.75rem;
    color: #6b7280;
    margin: 0;
  }

  @media (max-width: 640px) {
    .glass-card {
      padding: 2rem 1.5rem;
    }
    .header h1 {
      font-size: 1.75rem;
    }
  }
</style>
