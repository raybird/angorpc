<div class="login-container">
  <!-- Glowing background orbs -->
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>

  <div class="login-card-wrapper">
    <div class="login-card glass-panel">
      <header class="login-header">
        <div class="brand-badge">AngoRPC Admin</div>
        <h2>管理系統登入</h2>
        <p>請輸入您的商家管理員認證資訊</p>
      </header>

      @if (errorMessage()) {
        <div class="error-banner animate-shake">
          <span class="error-icon">⚠️</span>
          <span class="error-text">{{ errorMessage() }}</span>
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <!-- Email -->
        <div class="form-group">
          <label for="email">管理員電子信箱</label>
          <div class="input-wrapper">
            <span class="input-icon">✉</span>
            <input 
              id="email" 
              type="email" 
              formControlName="email" 
              placeholder="admin@example.com"
              [class.input-error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
            />
          </div>
          @if (loginForm.get('email')?.touched && loginForm.get('email')?.invalid) {
            <span class="field-error">請輸入合法的 Email 格式</span>
          }
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">安全密碼</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input 
              id="password" 
              type="password" 
              formControlName="password" 
              placeholder="請輸入您的密碼"
              [class.input-error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
            />
          </div>
          @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
            <span class="field-error">密碼長度需至少 6 碼</span>
          }
        </div>

        <button type="submit" class="btn-login" [disabled]="isLoading() || loginForm.invalid">
          @if (isLoading()) {
            <span class="loading-spinner"></span>
            <span>登入驗證中...</span>
          } @else {
            <span>安全登入</span>
          }
        </button>
      </form>
    </div>
  </div>
</div>
